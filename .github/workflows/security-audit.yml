name: Security Audit

on:
  schedule:
    # Run every day at 08:00 UTC
    - cron: '0 8 * * *'
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '**/package.json'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        id: audit
        run: pnpm run audit:ci
        env:
          AUDIT_LEVEL: moderate

      - name: Upload audit report
        if: failure() && steps.audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report-${{ github.run_id }}
          path: security-audit-report.json
          retention-days: 30

      # Open a GitHub Issue to alert the team when a scheduled run finds vulns.
      # PR runs already notify via the failed check status on the PR itself.
      - name: Create vulnerability alert issue
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Security Alert] Dependency vulnerabilities found — ${new Date().toISOString().slice(0, 10)}`;

            // Search for an existing open alert issue to avoid duplicates.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,automated',
              per_page: 10,
            });

            const duplicate = existing.data.find(i => i.title.startsWith('[Security Alert]'));
            if (duplicate) {
              // Add a comment instead of opening a new issue.
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `🔔 **Reminder:** Vulnerabilities were still present in the daily scan on ${new Date().toISOString().slice(0, 10)}.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['security', 'automated'],
              body: [
                '## Dependency Security Alert',
                '',
                'The daily automated security audit found one or more vulnerabilities at **moderate or higher** severity.',
                '',
                `**Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
                '',
                '### What to do',
                '1. Download the `security-audit-report` artifact from the workflow run above.',
                '2. Run `pnpm run audit:check` locally to see full details.',
                '3. Apply fixes via `pnpm run audit:fix` or add overrides to `pnpm-workspace.yaml`.',
                '4. Close this issue once all moderate+ findings are resolved.',
                '',
                '> This issue was opened automatically by the Security Audit workflow.',
              ].join('\n'),
            });
