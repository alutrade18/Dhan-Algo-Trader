name: Auto-fix Dependency Vulnerabilities

on:
  schedule:
    # Run daily at 09:00 UTC — one hour after the security audit at 08:00
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-fix Safe Dependency Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Check remote before any git operations so same-day reruns push cleanly.
      - name: Determine branch name and check remote existence
        id: branch-info
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          BRANCH="security/auto-fix-${DATE}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"     >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "branch_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture pre-fix audit report
        run: pnpm audit --json 2>/dev/null > /tmp/audit-before.json || true

      - name: Apply safe fixes via pnpm audit --fix
        run: pnpm audit --fix || true

      - name: Reinstall after fix
        run: pnpm install

      - name: Capture post-fix audit report
        run: pnpm audit --json 2>/dev/null > /tmp/audit-after.json || true

      # Stage dependency files first, then check the index — this ensures
      # has_changes reflects exactly what will be committed, avoiding a
      # "nothing to commit" failure when unrelated files happen to be dirty.
      - name: Stage dependency files and check for changes
        id: check-changes
        run: |
          git add -A -- pnpm-lock.yaml pnpm-workspace.yaml
          find . -name 'package.json' -not -path '*/node_modules/*' \
            -exec git add -- {} +
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes — audit is already clean or no auto-fixable patches available."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Dependency changes detected — a PR will be opened."
          fi

      - name: Build PR description
        if: steps.check-changes.outputs.has_changes == 'true'
        run: |
          node << 'JSEOF'
          const fs = require('fs');

          function parseAudit(path) {
            try {
              const raw = fs.readFileSync(path, 'utf8').trim();
              const jsonStart = raw.indexOf('{');
              if (jsonStart === -1) return null;
              return JSON.parse(raw.slice(jsonStart));
            } catch (_) { return null; }
          }

          const before = parseAudit('/tmp/audit-before.json');
          const after  = parseAudit('/tmp/audit-after.json');

          const bv = (before && before.metadata && before.metadata.vulnerabilities) || {};
          const av = (after  && after.metadata  && after.metadata.vulnerabilities)  || {};

          const levels = ['critical', 'high', 'moderate', 'low'];
          const severityRows = levels.map(level => {
            const b = bv[level] || 0;
            const a = av[level] || 0;
            const diff = b - a;
            const label = level.charAt(0).toUpperCase() + level.slice(1);
            const fixed = diff > 0 ? `-${diff}` : diff === 0 ? '–' : `+${Math.abs(diff)}`;
            return `| ${label} | ${b} | ${a} | ${fixed} |`;
          });

          const totalBefore = levels.reduce((s, l) => s + (bv[l] || 0), 0);
          const totalAfter  = levels.reduce((s, l) => s + (av[l] || 0), 0);
          const totalFixed  = totalBefore - totalAfter;

          // Build an advisory map supporting both audit JSON formats:
          //   v1: { advisories: { "<id>": { module_name, severity, patched_versions } } }
          //   v2: { vulnerabilities: { "<pkg>": { name, severity, fixAvailable } } }
          function advisoryMap(audit) {
            const map = new Map();
            if (!audit) return map;
            for (const [id, adv] of Object.entries(audit.advisories || {})) {
              map.set(`adv:${id}`, {
                name:  adv.module_name || adv.name || '(unknown)',
                sev:   adv.severity    || '?',
                fixed: adv.patched_versions || adv.fixedIn || '—',
              });
            }
            for (const [pkg, vuln] of Object.entries(audit.vulnerabilities || {})) {
              const key = `vuln:${pkg}`;
              if (!map.has(key)) {
                const fixInfo = vuln.fixAvailable;
                map.set(key, {
                  name:  vuln.name || pkg,
                  sev:   vuln.severity || '?',
                  fixed: fixInfo === true ? 'available'
                       : (typeof fixInfo === 'object' && fixInfo)
                           ? `${fixInfo.name}@${fixInfo.version}`
                           : '—',
                });
              }
            }
            return map;
          }

          const beforeMap = advisoryMap(before);
          const afterMap  = advisoryMap(after);

          const seen = new Set();
          const fixedPkgs = [];
          for (const [id, adv] of beforeMap) {
            if (!afterMap.has(id) && !seen.has(adv.name)) {
              seen.add(adv.name);
              fixedPkgs.push(adv);
            }
          }

          let pkgSection;
          if (fixedPkgs.length === 0) {
            pkgSection = ['*No individual package records matched — check `git diff pnpm-lock.yaml` for details.*'];
          } else {
            pkgSection = [
              '| Package | Severity resolved | Patched version |',
              '|---------|:-----------------:|-----------------|',
              ...fixedPkgs.map(a => `| \`${a.name}\` | ${a.sev} | ${a.fixed} |`),
            ];
          }

          // ── Override suggestions for remaining unfixable vulnerabilities ──────────
          //
          // `pnpm audit --fix` only handles direct semver-compatible bumps.
          // Vulnerabilities where fixAvailable is false (no patch exists) or is an
          // object with isSemVerMajor:true (breaking upgrade required) are left
          // behind.  We analyse the post-fix audit JSON and produce ready-to-paste
          // `overrides` entries the developer can add to pnpm-workspace.yaml.
          //
          // The `via` array of each vulnerability entry contains advisory objects
          // with a `range` field (the *vulnerable* semver range, e.g. "<1.2.3").
          // We parse that range to derive the minimum safe version and emit:
          //   "package": ">=X.Y.Z"

          /**
           * Given a vulnerable semver range string (e.g. "<1.2.3", ">=1.0.0 <2.0.0"),
           * returns the minimum safe version string, or null when the range is too
           * complex to parse automatically.
           */
          function safeVersionFromRange(range) {
            if (!range || typeof range !== 'string') return null;
            const r = range.trim();

            // Simple upper-bound: "<X.Y.Z"  →  safe is X.Y.Z
            const ltSimple = r.match(/^<(\d+\.\d+\.\d+(?:[-\w.+]*)?)$/);
            if (ltSimple) return ltSimple[1];

            // Upper-bound with lower: ">=A <B" or ">A <B"  →  safe is B
            const ltComplex = r.match(/(?:^|[\s,|]+)[<](\d+\.\d+\.\d+(?:[-\w.+]*)?)(?:\s|$)/);
            if (ltComplex) return ltComplex[1];

            // Exact with lte: "<=X.Y.Z" — can't determine exact next patch; return null
            return null;
          }

          // Collect override suggestions from the post-fix audit
          const overrideSuggestions = new Map(); // pkg name → { version, severity, reason }

          if (after) {
            // v2 format: { vulnerabilities: { pkg: { fixAvailable, via, severity } } }
            for (const [pkg, vuln] of Object.entries(after.vulnerabilities || {})) {
              const fixInfo = vuln.fixAvailable;
              const isUnfixable = fixInfo === false;
              const needsMajorBump = typeof fixInfo === 'object' && fixInfo !== null && fixInfo.isSemVerMajor === true;

              if (!isUnfixable && !needsMajorBump) continue;

              // Walk via entries to find advisory objects with a `range` field
              const viaEntries = Array.isArray(vuln.via) ? vuln.via : [];
              let safeVersion = null;
              let advisoryUrl = null;

              for (const entry of viaEntries) {
                if (typeof entry !== 'object' || entry === null) continue;
                advisoryUrl = advisoryUrl || entry.url || null;
                // Prefer explicit patched-version metadata over range inference
                if (!safeVersion) {
                  const explicit = entry.patched_versions || entry.fixedIn || null;
                  if (explicit) {
                    const m = String(explicit).match(/>=?(\d+\.\d+\.\d+(?:[-\w.+]*)?)/);
                    if (m) { safeVersion = m[1]; advisoryUrl = entry.url || advisoryUrl; break; }
                  }
                }
                // Fall back to parsing the vulnerable range
                if (!safeVersion && entry.range) {
                  const v = safeVersionFromRange(entry.range);
                  if (v) { safeVersion = v; advisoryUrl = entry.url || advisoryUrl; break; }
                }
              }

              // For major-bump fixes, also consider the top-level fix target version
              if (!safeVersion && needsMajorBump) {
                safeVersion = fixInfo.version || null;
              }

              const key = vuln.name || pkg;
              if (!overrideSuggestions.has(key) || (safeVersion && !overrideSuggestions.get(key).version)) {
                overrideSuggestions.set(key, {
                  version:  safeVersion,
                  severity: vuln.severity || '?',
                  reason:   needsMajorBump
                    ? `requires breaking upgrade (fix: ${fixInfo.name}@${fixInfo.version})`
                    : 'no patched version currently available',
                  url: advisoryUrl,
                });
              }
            }

            // v1 format: { advisories: { id: { module_name, patched_versions, severity } } }
            for (const [, adv] of Object.entries(after.advisories || {})) {
              const name = adv.module_name || adv.name;
              if (!name || overrideSuggestions.has(name)) continue;
              const patchedVersions = adv.patched_versions || '';
              // patched_versions like ">=1.2.3" → extract the version
              const match = patchedVersions.match(/>=(\d+\.\d+\.\d+(?:[-\w.+]*)?)/);
              const safeVersion = match ? match[1] : null;
              overrideSuggestions.set(name, {
                version:  safeVersion,
                severity: adv.severity || '?',
                reason:   'no auto-fix available',
                url:      adv.url || null,
              });
            }
          }

          // Build the overrides section lines
          let overrideSection = [];
          if (overrideSuggestions.size > 0) {
            const yamlLines = [];
            const tableRows = [];
            for (const [pkg, info] of [...overrideSuggestions.entries()].sort()) {
              const versionSpec = info.version ? `>=${info.version}` : null;
              if (versionSpec) {
                yamlLines.push(`  "${pkg}": "${versionSpec}"`);
              }
              const versionCell = versionSpec || '_unknown — check advisory_';
              const urlCell = info.url ? `[advisory](${info.url})` : '—';
              tableRows.push(`| \`${pkg}\` | ${info.severity} | ${versionCell} | ${info.reason} | ${urlCell} |`);
            }

            overrideSection = [
              '',
              '### Suggested `pnpm-workspace.yaml` overrides',
              '',
              'The following vulnerabilities **could not be auto-fixed** (no patched version or requires a breaking semver-major upgrade).',
              'Add these entries to the `overrides` section of `pnpm-workspace.yaml` to pin affected transitive dependencies to safe versions:',
              '',
            ];

            if (yamlLines.length > 0) {
              overrideSection.push(
                '```yaml',
                'overrides:',
                ...yamlLines,
                '```',
                '',
              );
            }

            overrideSection.push(
              '| Package | Severity | Suggested override | Reason | Advisory |',
              '|---------|:--------:|-------------------|--------|----------|',
              ...tableRows,
              '',
              '> **Note:** Verify each suggestion against the advisory before applying.',
              '> Overrides pin *all* copies of the package workspace-wide — confirm the pinned version is compatible.',
            );
          }

          const body = [
            '## Automated Dependency Security Fix',
            '',
            'Generated by the **Auto-fix Dependency Vulnerabilities** workflow.',
            '`pnpm audit --fix` was applied — lockfile changes only, no source-code modifications.',
            '',
            '### Vulnerability severity — before vs after',
            '',
            '| Severity | Before | After | Fixed |',
            '|----------|-------:|------:|------:|',
            ...severityRows,
            `| **Total** | **${totalBefore}** | **${totalAfter}** | **${totalFixed > 0 ? '-'+totalFixed : totalFixed}** |`,
            '',
            totalAfter > 0
              ? '> **Note:** Some vulnerabilities remain and could not be resolved automatically. See override suggestions below.'
              : '> All detected vulnerabilities were resolved.',
            '',
            '### Packages updated',
            '',
            ...pkgSection,
            ...overrideSection,
            '',
            '### Review checklist',
            '- [ ] CI passes on this PR',
            '- [ ] No breaking changes in updated packages',
            ...(overrideSuggestions.size > 0 ? ['- [ ] Review and apply suggested `pnpm-workspace.yaml` overrides for remaining vulnerabilities'] : []),
            '- [ ] Merge promptly to close the vulnerability window',
          ].join('\n');

          fs.writeFileSync('/tmp/pr-body.md', body);
          console.log('PR description written.');
          JSEOF

      - name: Commit and push fix branch
        if: steps.check-changes.outputs.has_changes == 'true'
        env:
          BRANCH: ${{ steps.branch-info.outputs.branch }}
          DATE: ${{ steps.branch-info.outputs.date }}
          BRANCH_EXISTS: ${{ steps.branch-info.outputs.branch_exists }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(security): auto-apply pnpm audit --fix patches [${DATE}]"
          if [ "$BRANCH_EXISTS" = "true" ]; then
            git push origin HEAD:"$BRANCH" --force
          else
            git push origin HEAD:"$BRANCH"
          fi

      # Close open security auto-fix PRs that are either:
      #   (a) older than STALE_PR_DAYS — they are stale regardless of today's run, OR
      #   (b) superseded by today's run (has_changes == true) — close all prior
      #       ones so at most one security auto-fix PR is ever open at a time.
      # Running the step unconditionally (no `if` guard) means stale PRs are
      # also cleaned up on days where no new lockfile changes are detected.
      - name: Close stale security auto-fix PRs
        uses: actions/github-script@v7
        env:
          # Number of days after which a security auto-fix PR is considered stale
          # and will be auto-closed even on days with no new lockfile changes.
          # On days where new patches are available a new PR supersedes all prior
          # ones regardless of age.  Tune to match your team's review cadence.
          STALE_PR_DAYS: '3'
          TODAY_BRANCH: ${{ steps.branch-info.outputs.branch }}
          HAS_CHANGES: ${{ steps.check-changes.outputs.has_changes }}
        with:
          script: |
            const staleDays   = Math.max(1, parseInt(process.env.STALE_PR_DAYS, 10) || 3);
            const todayBranch = process.env.TODAY_BRANCH;
            const hasChanges  = process.env.HAS_CHANGES === 'true';

            // Fetch all open PRs (paginate to handle repos with many open PRs)
            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            for (const pr of openPRs) {
              const headRef = pr.head.ref;

              // Target only security auto-fix branches that are NOT today's branch
              if (!headRef.startsWith('security/auto-fix-') || headRef === todayBranch) continue;

              // Require both the 'security' and 'automated' labels
              const labels = (pr.labels || []).map(l => l.name);
              if (!labels.includes('security') || !labels.includes('automated')) continue;

              const ageDays   = Math.floor((Date.now() - new Date(pr.created_at).getTime()) / 86400000);
              const isStale   = ageDays >= staleDays;

              // Close if: stale (older than threshold) OR superseded by today's new PR
              if (!isStale && !hasChanges) {
                console.log(`PR #${pr.number} (${headRef}) is ${ageDays}d old and no new PR today — skipping.`);
                continue;
              }

              const reason = hasChanges && isStale
                ? `stale (${ageDays}d > ${staleDays}d threshold) and superseded by today's patches`
                : hasChanges
                  ? `superseded by today's patches (${ageDays}d old, threshold: ${staleDays}d)`
                  : `stale — open for ${ageDays}d, exceeding the ${staleDays}-day review window`;

              console.log(`Closing PR #${pr.number} (${headRef}): ${reason}.`);

              const bodyLines = [
                `## Closed by the security auto-fix workflow`,
                ``,
                isStale
                  ? `This PR was open for **${ageDays} day(s)**, exceeding the configured ${staleDays}-day staleness threshold.`
                  : `This PR was open for **${ageDays} day(s)**.`,
              ];

              if (hasChanges) {
                bodyLines.push(
                  ``,
                  `It has been superseded by the \`${todayBranch}\` PR opened with today's latest patches.`,
                  `Only one security auto-fix PR is kept open at a time to prevent outdated patches`,
                  `from competing with the current fix.`,
                );
              } else {
                bodyLines.push(
                  ``,
                  `No new lockfile changes were detected today, but this PR exceeded the staleness`,
                  `threshold and has been closed to keep the review queue clean.`,
                );
              }

              bodyLines.push(
                ``,
                `Adjust the threshold via \`STALE_PR_DAYS\` in the \`Close stale security auto-fix PRs\``,
                `step of \`.github/workflows/auto-fix-vulnerabilities.yml\`.`,
              );

              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.number,
                body:         bodyLines.join('\n'),
              });

              await github.rest.pulls.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                pull_number:  pr.number,
                state:        'closed',
              });
            }

      - name: Open or update pull request
        if: steps.check-changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.branch-info.outputs.branch }}
          DATE: ${{ steps.branch-info.outputs.date }}
        with:
          script: |
            const fs     = require('fs');
            const body   = fs.readFileSync('/tmp/pr-body.md', 'utf8');
            const branch = process.env.BRANCH;
            const date   = process.env.DATE;

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${branch}`,
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              await github.rest.pulls.update({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                pull_number:  pr.number,
                body,
              });
              console.log(`Updated existing PR #${pr.number}: ${pr.html_url}`);
              await core.summary.addRaw(`Updated existing PR: ${pr.html_url}`).write();
              return;
            }

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `fix(security): auto-apply dependency patches [${date}]`,
              head:  branch,
              base:  'main',
              body,
            });

            try {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.data.number,
                labels:       ['security', 'automated', 'dependencies'],
              });
            } catch (_) {}

            console.log(`PR created: ${pr.data.html_url}`);
            await core.summary.addRaw(`PR created: ${pr.data.html_url}`).write();
